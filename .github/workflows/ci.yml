name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  windows:
    name: Windows (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            runner: windows-latest
            msystem: UCRT64
            arch: ucrt-x86_64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout ditty
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout boba (dependency)
        uses: actions/checkout@v5
        with:
          repository: chestso/boba
          path: boba
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            git
            mingw-w64-${{ matrix.arch }}-toolchain
            autoconf
            automake
            libtool
            make
            pkg-config
            mingw-w64-${{ matrix.arch }}-gc
            mingw-w64-${{ matrix.arch }}-pcre2
            zip
            p7zip

      - name: Build & install boba
        working-directory: boba
        run: |
          ./autogen.sh
          mkdir build && cd build
          sh ../configure --prefix="$MINGW_PREFIX"
          make -j"$(nproc)"
          make check
          make install

      - name: Build ditty
        run: |
          ./autogen.sh
          mkdir build && cd build
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            sh ../configure --enable-release
          else
            sh ../configure
          fi
          make -j"$(nproc)"

      - name: Run tests
        run: make -C build check VERBOSE=1

      - name: Build portable ZIP
        run: make -C build dist-portable

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ditty-windows-${{ matrix.label }}
          path: ditty-*-windows-*.zip
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 1 || 30 }}

  macos:
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout ditty
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout boba (dependency)
        uses: actions/checkout@v5
        with:
          repository: chestso/boba
          path: boba
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config \
            bdw-gc pcre2 librsvg

      - name: Build & install boba
        working-directory: boba
        run: |
          ./autogen.sh
          mkdir build && cd build
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            ../configure --prefix="$(brew --prefix)" --enable-release
          else
            ../configure --prefix="$(brew --prefix)"
          fi
          make -j"$(sysctl -n hw.ncpu)"
          make check
          make install

      - name: Build ditty
        run: |
          ./autogen.sh
          mkdir build && cd build
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            ../configure --enable-release
          else
            ../configure
          fi
          make -j"$(sysctl -n hw.ncpu)"

      - name: Run tests
        run: make -C build check VERBOSE=1

      - name: Build portable .app
        run: make -C build dist-app

      - name: Upload portable .app
        uses: actions/upload-artifact@v7
        with:
          name: ditty-macos-${{ matrix.arch }}
          path: ditty-*-macos-*.zip
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 1 || 30 }}

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ditty
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make pkg-config \
            libgc-dev libpcre2-dev

      - name: Build dist tarball
        run: |
          ./autogen.sh
          mkdir build && cd build
          ../configure
          make dist

      - name: Download Windows portable ZIP
        uses: actions/download-artifact@v6
        with:
          name: ditty-windows-x86_64
          path: artifacts/windows

      - name: Download macOS portable .app
        uses: actions/download-artifact@v6
        with:
          name: ditty-macos-arm64
          path: artifacts/macos

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/ditty-*.tar.gz
            artifacts/windows/ditty-*-windows-*.zip
            artifacts/macos/ditty-*-macos-*.zip
          generate_release_notes: false
          fail_on_unmatched_files: true
